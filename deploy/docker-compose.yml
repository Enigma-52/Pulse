version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pulse-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - pulse-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: pulse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - pulse-net

  ingestion:
    build:
      context: ../services/ingestion
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PULSE_KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pulse-net

  worker:
    build:
      context: ../services/worker
      dockerfile: Dockerfile
    environment:
      PULSE_KAFKA_BROKERS: kafka:29092
      PULSE_TRACES_TOPIC: traces_raw
      PULSE_WORKER_GROUP: pulse-worker
      PULSE_CLICKHOUSE_ADDR: clickhouse:9000
      PULSE_CLICKHOUSE_DB: default
      PULSE_CLICKHOUSE_USER: default
      PULSE_CLICKHOUSE_PASSWORD: pulse
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - pulse-net

  query-api:
    build:
      context: ../services/query-api
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      PULSE_CLICKHOUSE_ADDR: clickhouse:9000
      PULSE_CLICKHOUSE_DB: default
      PULSE_CLICKHOUSE_USER: default
      PULSE_CLICKHOUSE_PASSWORD: pulse
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pulse-net

  ui:
    build:
      context: ../ui/web
      dockerfile: Dockerfile
    ports:
      - "3301:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      query-api:
        condition: service_healthy
    networks:
      - pulse-net

networks:
  pulse-net:
    driver: bridge

volumes:
  clickhouse_data:
    driver: local
